<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Bunda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FAF6F0;
            -webkit-font-smoothing: antialiased;
        }
        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* ✉️ ANIMASI FLOATING AMPLOP ULTRA SMOOTH */
        .floating-envelope {
            animation: elegantFloat 4s ease-in-out infinite;
            will-change: transform;
        }
        @keyframes elegantFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* ✨ BASE POLAROID FRAME STYLE */
        .polaroid-container {
            position: relative;
            margin-bottom: 2rem;
            break-inside: avoid;
            display: block;
            will-change: transform;
        }

        .polaroid-frame {
            background: #FFFFFF;
            padding: 12px 12px 18px 12px;
            box-shadow: 0 4px 20px rgba(163, 145, 122, 0.04);
            border: 1px solid rgba(230, 220, 205, 0.4);
            display: block;
            width: 100%;
            cursor: zoom-in;
            transform: rotate(var(--base-rot, 0deg));
            will-change: transform, box-shadow;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 🎯 EFEK HOVER ULTRA SMOOTH */
        .polaroid-container:hover {
            z-index: 50 !important;
        }

        .polaroid-container:hover .polaroid-frame {
            box-shadow: 0 30px 60px rgba(163, 145, 122, 0.18) !important;
            transform: translateY(-14px) rotate(0deg) scale(1.04) !important;
        }

        /* 🎬 SCROLL REVEAL OPTIMIZED */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(40px);
            will-change: transform, opacity;
            transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1), transform 1.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 🎬 TEXT SLIDE UP OPTIMIZED */
        .text-slide-up {
            opacity: 0;
            transform: translateY(25px);
            will-change: transform, opacity;
            transition: opacity 1.6s cubic-bezier(0.16, 1, 0.3, 1), transform 1.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .text-slide-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hiasan Garis Pembatas Mewah */
        .elegant-divider {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 131, 120, 0.3), transparent);
            margin: 16px auto 0 auto;
            transition: width 2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .text-slide-up.visible .elegant-divider {
            width: 160px;
        }

        /* ⌨️ TYPEWRITER CURSOR BLINK */
        .typewriter-cursor::after {
            content: '|';
            animation: blink 0.9s step-start infinite;
            color: #2b2926;
            font-weight: 300;
            margin-left: 3px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 🔍 LIGHTBOX OVERLAY */
        #lightboxOverlay {
            position: fixed;
            inset: 0;
            background-color: rgba(43, 41, 38, 0);
            backdrop-filter: blur(0px);
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: background-color 0.6s cubic-bezier(0.16, 1, 0.3, 1), backdrop-filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #lightboxOverlay.active {
            background-color: rgba(28, 27, 25, 0.72);
            backdrop-filter: blur(16px);
            pointer-events: auto;
        }

        /* Polaroid Zoom di Tengah Layar */
        .zoomed-container {
            background: #FFFFFF;
            padding: 16px 16px 24px 16px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.28);
            border-radius: 4px;
            max-width: 90vw;
            width: fit-content;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.88) translateY(25px);
            opacity: 0;
            will-change: transform, opacity;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: zoom-out;
        }
        #lightboxOverlay.active .zoomed-container {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="relative w-full h-screen overflow-hidden bg-[#FAF6F0]">

    <div id="mainScrollableContent" class="hidden opacity-0 w-full h-screen overflow-y-auto relative z-10 scroll-smooth">

            <div id="envelopeWrapper" class="floating-envelope flex flex-col items-center justify-center cursor-pointer group will-change-[transform,opacity] transition-all duration-1000 ease-out">
                <div class="relative w-72 h-48 bg-[#F4EFE6] rounded-lg shadow-2xl border border-stone-200/40 flex items-center justify-center transition-transform group-hover:scale-105 duration-700">
                    <div class="absolute top-0 inset-x-0 h-0 w-0 border-t-[96px] border-t-[#EAE3D5] border-x-[144px] border-x-transparent border-b-0 origin-top z-10 rounded-t-lg"></div>
                    <div class="absolute bottom-0 inset-x-0 h-0 w-0 border-b-[96px] border-b-[#E5DCD0] border-x-[144px] border-x-transparent border-t-0 rounded-b-lg"></div>
                    <div class="absolute w-14 h-14 bg-rose-700/90 rounded-full z-20 flex items-center justify-center shadow-md border-2 border-rose-800 group-hover:bg-rose-600 transition-colors animate-pulse">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#FFE4E1" stroke="#FFE4E1"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /></svg>
                    </div>

                <p class="mt-6 text-stone-400 font-serif tracking-widest text-xs uppercase">

        <div id="revealedContent" class="hidden w-full flex flex-col items-center pb-24">

            <div id="filmSection" class="w-full flex flex-col items-center px-6">

                <div class="columns-1 sm:columns-2 md:columns-3 gap-8 max-w-4xl w-full">

                    <div class="polaroid-container scroll-reveal" style="--base-rot: -2deg;">
                        <div class="polaroid-frame">
                            <img src="https://raw.githubusercontent.com/Dvnnjad4m/boOnda/58806c0b7cf3a54d8d3bfa054f1d79640e09b610/FB_IMG_1579182525825.jpg" class="w-full h-auto rounded-sm shadow-sm" alt="Memory 1">

                    <div class="polaroid-container scroll-reveal" style="--base-rot: -1.5deg;">
                        <div class="polaroid-frame">
                            <img src="https://raw.githubusercontent.com/Dvnnjad4m/boOnda/58806c0b7cf3a54d8d3bfa054f1d79640e09b610/IMG_20220409_160443.jpg" class="w-full h-auto rounded-sm shadow-sm" alt="Memory 5">
                            <p class="font-serif italic text-center text-lg text-stone-600 mt-3 tracking-wide">

                            <img src="https://raw.githubusercontent.com/Dvnnjad4m/boOnda/58806c0b7cf3a54d8d3bfa054f1d79640e09b610/file_recovery_16959877425993669(1).jpg" class="w-full h-auto rounded-sm shadow-sm" alt="Memory 6">

    <script>
        const pinScreen = document.getElementById("pinScreen");
        const pinInput = document.getElementById("pinInput");
        const errorMessage = document.getElementById("errorMessage");
        const lockIconWrapper = document.getElementById("lockIconWrapper");
        const lockShackle = document.getElementById("lockShackle");

        const mainScrollableContent = document.getElementById("mainScrollableContent");
        const envelopeSection = document.getElementById("envelopeSection");
        const envelopeWrapper = document.getElementById("envelopeWrapper");
        const greetingSection = document.getElementById("greetingSection");
        const letterSection = document.getElementById("letterSection");
        const revealedContent = document.getElementById("revealedContent");
        const lightboxOverlay = document.getElementById("lightboxOverlay");
        const typewrittenText = document.getElementById("typewrittenText");
        const bgMusic = document.getElementById("bgMusic");

        const CORRECT_PIN = "181109"; 
        
        const LETTER_MESSAGE = '"kakak di elp as i made this, yh emng hebat kakak tuh. jadi yang pertama, kakak rasa bunda harus bangga dengan segala kelebihan kakak di smanda terutama nilai kakak.. n deep down, kakak juga berusaha buat dapet nilai menjaga nilai kakak cuman buat bunda bangga, senang, meskipun bunda gapernah nuntut sekalipun ;] kakak juga ahli dalam bicara kan yH, dan kakak juga bisa berteman dengan baik dan menjaga pergaulan, so bunda tenang sj. ketakutan kakak buat sekarang sejujurnya.. gabisa memenuhi ekspektasi, baik bunda ataupun kakak, n so kakak really want to say thanks buat jadi my mother bunda, kakak sayang bunda banget sedunia, bye"';

        let isLightboxOpen = false;

        let audioCtx, gainNode;
        const MAX_VOLUME = 0.15; 

        function initAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                const source = audioCtx.createMediaElementSource(bgMusic);
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }
        }

        function fadeInMusic(duration = 4) {
            initAudioEngine();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            bgMusic.play().then(() => {
                gainNode.gain.setValueAtTime(0.001, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(MAX_VOLUME, audioCtx.currentTime + duration);
            }).catch(err => console.log("Autoplay terblokir browser."));
        }

        function fadeOutMusic(targetVolume = 0.02, duration = 1.2) {
            if (gainNode && audioCtx) {
                gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(targetVolume, audioCtx.currentTime + duration);
            }
        }

        pinInput.addEventListener("input", (e) => {
            const currentVal = e.target.value;
            errorMessage.classList.add("opacity-0");

            if (currentVal.length === 6) {
                if (currentVal === CORRECT_PIN) {
                    lockIconWrapper.classList.add("bg-stone-50", "border-stone-300");
                    lockShackle.setAttribute("d", "M7 7a5 5 0 0 1 9.5-1.5");
                    pinInput.blur();

                    setTimeout(() => {
                        pinScreen.classList.add("opacity-0", "scale-105", "pointer-events-none");
                        mainScrollableContent.classList.remove("hidden");
                        setTimeout(() => {
                            mainScrollableContent.classList.remove("opacity-0");
                        }, 50);
                        setTimeout(() => {
                            pinScreen.remove();
                        }, 1000);
                    }, 600);
                } else {
                    pinInput.classList.add("border-rose-300", "animate-bounce");
                    errorMessage.classList.remove("opacity-0");
                    setTimeout(() => {
                        pinInput.classList.remove("border-rose-300", "animate-bounce");
                        pinInput.value = "";
                    }, 800);
                }
            }
        });

        function startTypingEffect(element, text, normalSpeed, callback) {
            let index = 0;
            element.innerText = "";

            function type() {
                if (index < text.length) {
                    const char = text.charAt(index);
                    element.innerText += char;
                    index++;

                    let currentSpeed = normalSpeed;
                    if (char === ',' || char === '!' || char === '.') {
                        currentSpeed = 600;
                    }

                    setTimeout(type, currentSpeed);
                } else {
                    element.classList.remove("typewriter-cursor");
                    if (callback) callback();
                }
            }
            type();
        }

        envelopeWrapper.addEventListener("click", () => {
            envelopeWrapper.classList.remove("floating-envelope");
            envelopeWrapper.classList.add("opacity-0", "scale-95", "pointer-events-none");

            fadeInMusic(4);

            setTimeout(() => {
                envelopeSection.classList.remove("h-screen");
                envelopeSection.classList.add("h-32", "pt-8");
                envelopeWrapper.classList.add("hidden");

                revealedContent.classList.remove("hidden");

                setTimeout(() => {
                    greetingSection.classList.add("visible");
                }, 150);

                setTimeout(() => {
                    letterSection.classList.add("visible");

                    setTimeout(() => {
                        startTypingEffect(typewrittenText, LETTER_MESSAGE, 45, () => {
                            initScrollReveal();
                            initLightboxEngine();
                            startPetalAnimation();
                        });
                    }, 800);

                }, 850);

            }, 500);
        });

        function initScrollReveal() {
            const revealElements = document.querySelectorAll('.scroll-reveal');

            const observerOptions = {
                root: mainScrollableContent,
                rootMargin: "0px 0px -120px 0px",
                threshold: 0.01
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            revealElements.forEach(el => observer.observe(el));
        }

        function initLightboxEngine() {
            const frames = document.querySelectorAll('.polaroid-frame');

            frames.forEach(frame => {
                frame.addEventListener('click',
                    (e) => {
                        e.stopPropagation();

                        if (isLightboxOpen) return;
                        isLightboxOpen = true;

                        fadeOutMusic(0.02, 1.0);

                        const srcTarget = frame.querySelector('img').getAttribute('src');

                        const container = document.createElement('div');
                        container.className = "zoomed-container";
                        container.innerHTML = `
                        <img src="${srcTarget}" class="max-h-[75vh] max-w-[85vw] md:max-w-[40vw] w-auto h-auto object-contain rounded-sm" alt="zoomed">
                        `;

                        lightboxOverlay.innerHTML = '';
                        lightboxOverlay.appendChild(container);
                        lightboxOverlay.classList.add('active');
                    });
            });
        }

        lightboxOverlay.addEventListener('click', () => {
            lightboxOverlay.classList.remove('active');
            
            if (gainNode && audioCtx) {
                gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(MAX_VOLUME, audioCtx.currentTime + 1.2);
            }

            setTimeout(() => {
                lightboxOverlay.innerHTML = '';
                isLightboxOpen = false;
            }, 600);
        });

        const petalCanvas = document.getElementById("petalCanvas");
        const pCtx = petalCanvas.getContext("2d");
        let petals = [];
        let isAnimationActive = false;

        function resizeCanvas() {
            petalCanvas.width = window.innerWidth;
            petalCanvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        function createPetal() {
            return {
                x: Math.random() * petalCanvas.width,
                y: -20,
                size: Math.random() * 6 + 4,
                speedY: Math.random() * 0.9 + 0.5,
                speedX: Math.random() * 0.4 - 0.2,
                opacity: Math.random() * 0.2 + 0.3,
                rotation: Math.random() * 360,
                rotationSpeed: Math.random() * 1.0 - 0.5,
                color: ["#FBCFE8", "#FCE7F3", "#FFF1F2", "#FFE4E1"][Math.floor(Math.random() * 4)]
            };
        }

        function startPetalAnimation() {
            isAnimationActive = true;
            for (let i = 0; i < 20; i++) {
                let petal = createPetal();
                petal.y = Math.random() * petalCanvas.height;
                petals.push(petal);
            }
            animatePetals();
        }

        function animatePetals() {
            if (!isAnimationActive) return;
            pCtx.clearRect(0, 0, petalCanvas.width, petalCanvas.height);

            if (petals.length < 30 && Math.random() < 0.04) {
                petals.push(createPetal());
            }

            petals.forEach((p, index) => {
                p.y += p.speedY;
                p.x += p.speedX + Math.sin(p.y / 60) * 0.12;
                p.rotation += p.rotationSpeed;

                if (p.y > petalCanvas.height + 20) {
                    petals[index] = createPetal();
                }

                pCtx.save();
                pCtx.translate(p.x, p.y);
                pCtx.rotate((p.rotation * Math.PI) / 180);
                pCtx.globalAlpha = p.opacity;
                pCtx.fillStyle = p.color;
                pCtx.beginPath();
                pCtx.ellipse(0, 0, p.size, p.size / 1.6, 0, 0, Math.PI * 2);
                pCtx.fill();
                pCtx.restore();
            });

            requestAnimationFrame(animatePetals);
        }
    </script>
</body>
</html>
